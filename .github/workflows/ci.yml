name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npx tsc --noEmit

  validate-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate n8n workflow JSON
        run: |
          set -euo pipefail
          fail=0
          for f in n8n-workflows/*.json; do
            if ! jq -e '.name and (.nodes | type == "array") and (.connections | type == "object")' "$f" > /dev/null; then
              echo "::error file=$f::not a valid n8n workflow (missing name/nodes/connections)"
              fail=1
            fi
          done
          exit $fail

  validate-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check migrations are non-empty and lexically ordered
        run: |
          set -euo pipefail
          prev=""
          for f in $(ls supabase/migrations/*.sql | sort); do
            if [ ! -s "$f" ]; then
              echo "::error file=$f::migration file is empty"
              exit 1
            fi
            if [[ -n "$prev" && "$f" < "$prev" ]]; then
              echo "::error::migrations out of lexical order: $f before $prev"
              exit 1
            fi
            prev="$f"
          done
